# Application Name
spring.application.name=order-inventory-system

# Database Configuration
spring.datasource.url=jdbc:mysql://3.25.188.160:3306/order_inventory_db
spring.datasource.username=teamuser
spring.datasource.password=${Password}

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Mysql Dialect
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Server Port
server.port=8080

#security configuration
spring.cloud.vault.uri=http://127.0.0.1:8200
spring.cloud.vault.token=${VAULT_TOKEN}
spring.cloud.vault.kv.enabled=true
spring.cloud.vault.kv.default-context=secret/order-inventory-system
spring.config.import=vault://
spring.cloud.compatibility-verifier.enabled=false