<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Store Management (Traditional CRUD)</title>
    <link rel="stylesheet" th:href="@{/css/common/common.css}">
    <link rel="stylesheet" th:href="@{/css/common/navbar.css}">
    <link rel="stylesheet" th:href="@{/css/pages/store-crud.css}">
</head>
<body>

<!-- NAVBAR -->
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="crud-page">

    <!-- HEADER -->
    <div class="crud-header">
        <div>
            <h1>Store Management</h1>
            <p>Direct Spring MVC CRUD Operations with Backend Pagination & Validation</p>
        </div>
        <div class="header-actions">
            <a th:href="@{/store-module/dashboard}" class="btn-secondary">
                ← Dashboard
            </a>
            <a th:href="@{/store-module/stores/create}" class="btn-primary">
                + Add New Store
            </a>
        </div>
    </div>

    <!-- NOTIFICATIONS -->
    <div th:if="${successMessage != null}" class="alert alert-success">
        <span>✓</span>
        <span th:text="${successMessage}"></span>
    </div>
    <div th:if="${errorMessage != null}" class="alert alert-error">
        <span>⚠️</span>
        <span th:text="${errorMessage}"></span>
    </div>

    <!-- MAIN CARD -->
    <div class="crud-card">
        <div class="table-responsive">
            <table class="crud-table">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Store Name</th>
                    <th>Web Address</th>
                    <th>Physical Address</th>
                    <th>Latitude</th>
                    <th>Longitude</th>
                    <th style="text-align: right;">Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="store : ${stores}">
                    <td th:text="${store.storeId}" style="font-weight: 700; color: #475569;"></td>
                    <td th:text="${store.storeName}" style="font-weight: 600;"></td>
                    <td>
                        <a th:if="${store.webAddress != null && !store.webAddress.isBlank()}" 
                           th:href="'http://' + ${store.webAddress}" 
                           th:text="${store.webAddress}" 
                           target="_blank" 
                           style="color: #2563eb; text-decoration: none;"></a>
                        <span th:if="${store.webAddress == null || store.webAddress.isBlank()}" style="color: #cbd5e1; font-style: italic;">None</span>
                    </td>
                    <td th:text="${store.physicalAddress != null && !store.physicalAddress.isBlank()} ? ${store.physicalAddress} : 'None'" th:style="${store.physicalAddress == null || store.physicalAddress.isBlank()} ? 'color: #cbd5e1; font-style: italic;' : ''"></td>
                    <td th:text="${store.latitude != null} ? ${store.latitude} : '-'"></td>
                    <td th:text="${store.longitude != null} ? ${store.longitude} : '-'"></td>
                    <td style="text-align: right; white-space: nowrap;">
                        <a th:href="@{/store-module/stores/edit/{id}(id=${store.storeId})}" class="action-btn edit">
                            Edit
                        </a>
                        <a th:href="@{/store-module/stores/delete/{id}(id=${store.storeId})}" 
                           class="action-btn delete" 
                           onclick="return confirm('Are you sure you want to delete this store?')">
                            Delete
                        </a>
                    </td>
                </tr>
                <tr th:if="${stores.isEmpty()}">
                    <td colspan="7" style="text-align: center; padding: 40px; color: #64748b; font-style: italic;">
                        No stores found in database.
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

        <!-- PAGINATION CONTROLS -->
        <div class="pagination-wrapper" th:if="${totalPages > 1}">
            <div class="pagination-info">
                Showing page <span th:text="${currentPage + 1}" style="font-weight: 700; color: #0f172a;"></span> 
                of <span th:text="${totalPages}" style="font-weight: 700; color: #0f172a;"></span> 
                (Total <span th:text="${totalItems}"></span> stores)
            </div>
            
            <div class="pagination-links">
                <!-- First Page -->
                <a th:href="@{/store-module/stores(page=0)}" 
                   th:classappend="${currentPage == 0} ? 'disabled' : ''"
                   title="First Page">«</a>
                
                <!-- Previous Page -->
                <a th:href="@{/store-module/stores(page=${currentPage - 1})}" 
                   th:classappend="${currentPage == 0} ? 'disabled' : ''"
                   title="Previous Page">‹</a>
                
                <!-- First Page always if not in range -->
                <a th:if="${currentPage - 3 > 0}"
                   th:href="@{/store-module/stores(page=0)}"
                   th:text="1"></a>
                
                <!-- Ellipsis before window -->
                <span th:if="${currentPage - 3 > 1}" style="display: inline-flex; align-items: center; justify-content: center; width: 38px; height: 38px; border: 1px solid #e2e8f0; border-radius: 10px; color: #64748b; font-weight: 600;">...</span>

                <!-- Dynamic Page Numbers in sliding window -->
                <a th:each="pageNum : ${#numbers.sequence(0, totalPages - 1)}"
                   th:if="${pageNum >= currentPage - 3 && pageNum <= currentPage + 3}"
                   th:href="@{/store-module/stores(page=${pageNum})}"
                   th:text="${pageNum + 1}"
                   th:classappend="${pageNum == currentPage} ? 'active' : ''"></a>

                <!-- Ellipsis after window -->
                <span th:if="${currentPage + 3 < totalPages - 2}" style="display: inline-flex; align-items: center; justify-content: center; width: 38px; height: 38px; border: 1px solid #e2e8f0; border-radius: 10px; color: #64748b; font-weight: 600;">...</span>

                <!-- Last Page always if not in range -->
                <a th:if="${currentPage + 3 < totalPages - 1}"
                   th:href="@{/store-module/stores(page=${totalPages - 1})}"
                   th:text="${totalPages}"></a>
                
                <!-- Next Page -->
                <a th:href="@{/store-module/stores(page=${currentPage + 1})}" 
                   th:classappend="${currentPage == totalPages - 1} ? 'disabled' : ''"
                   title="Next Page">›</a>
                
                <!-- Last Page -->
                <a th:href="@{/store-module/stores(page=${totalPages - 1})}" 
                   th:classappend="${currentPage == totalPages - 1} ? 'disabled' : ''"
                   title="Last Page">»</a>
            </div>
        </div>

    </div>

</div>

</body>
</html>
