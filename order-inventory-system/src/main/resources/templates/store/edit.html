<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Store</title>
    <link rel="stylesheet" th:href="@{/css/common/common.css}">
    <link rel="stylesheet" th:href="@{/css/common/navbar.css}">
    <link rel="stylesheet" th:href="@{/css/pages/store-crud.css}">
</head>
<body>

<!-- NAVBAR -->
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="crud-page">

    <!-- HEADER -->
    <div class="crud-header" style="max-width: 600px; margin: 0 auto 30px;">
        <div>
            <h1>Edit Store</h1>
            <p>Update the store details. Unchanged fields will retain their current values.</p>
        </div>
    </div>

    <!-- GENERAL ERROR -->
    <div th:if="${errorMessage != null}" class="alert alert-error" style="max-width: 600px; margin: 0 auto 24px;">
        <span>⚠️</span>
        <span th:text="${errorMessage}"></span>
    </div>

    <!-- FORM CARD -->
    <div class="crud-card form-container">
        <form th:action="@{/store-module/stores/edit/{id}(id=${storeId})}" th:object="${storeForm}" method="post">
            <div class="form-grid">
                
                <!-- Store Name -->
                <div class="form-group">
                    <label for="storeName">Store Name *</label>
                    <input type="text" 
                           id="storeName" 
                           th:field="*{storeName}" 
                           class="form-control" 
                           th:classappend="${#fields.hasErrors('storeName')} ? 'is-invalid' : ''"
                           placeholder="Enter store name" 
                           required>
                    <span class="field-error" 
                          th:if="${#fields.hasErrors('storeName')}" 
                          th:errors="*{storeName}"></span>
                </div>

                <!-- Web Address -->
                <div class="form-group">
                    <label for="webAddress">Web Address</label>
                    <input type="text" 
                           id="webAddress" 
                           th:field="*{webAddress}" 
                           class="form-control" 
                           th:classappend="${#fields.hasErrors('webAddress')} ? 'is-invalid' : ''"
                           placeholder="e.g. www.example.com">
                    <span class="field-error" 
                          th:if="${#fields.hasErrors('webAddress')}" 
                          th:errors="*{webAddress}"></span>
                </div>

                <!-- Physical Address -->
                <div class="form-group">
                    <label for="physicalAddress">Physical Address</label>
                    <input type="text" 
                           id="physicalAddress" 
                           th:field="*{physicalAddress}" 
                           class="form-control" 
                           th:classappend="${#fields.hasErrors('physicalAddress')} ? 'is-invalid' : ''"
                           placeholder="Enter physical address">
                    <span class="field-error" 
                          th:if="${#fields.hasErrors('physicalAddress')}" 
                          th:errors="*{physicalAddress}"></span>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                    <!-- Latitude -->
                    <div class="form-group">
                        <label for="latitude">Latitude</label>
                        <input type="number" 
                               step="any"
                               id="latitude" 
                               th:field="*{latitude}" 
                               class="form-control" 
                               th:classappend="${#fields.hasErrors('latitude')} ? 'is-invalid' : ''"
                               placeholder="e.g. 37.7749">
                        <span class="field-error" 
                              th:if="${#fields.hasErrors('latitude')}" 
                              th:errors="*{latitude}"></span>
                    </div>

                    <!-- Longitude -->
                    <div class="form-group">
                        <label for="longitude">Longitude</label>
                        <input type="number" 
                               step="any"
                               id="longitude" 
                               th:field="*{longitude}" 
                               class="form-control" 
                               th:classappend="${#fields.hasErrors('longitude')} ? 'is-invalid' : ''"
                               placeholder="e.g. -122.4194">
                        <span class="field-error" 
                              th:if="${#fields.hasErrors('longitude')}" 
                              th:errors="*{longitude}"></span>
                    </div>
                </div>

            </div>

            <!-- FORM ACTIONS -->
            <div class="form-actions">
                <a th:href="@{/store-module/stores}" class="btn-secondary">
                    Cancel
                </a>
                <button type="submit" class="btn-primary">
                    Update Store
                </button>
            </div>
        </form>
    </div>

</div>

</body>
</html>
