<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Inventory Management (Traditional CRUD)</title>
    <link rel="stylesheet" th:href="@{/css/common/common.css}">
    <link rel="stylesheet" th:href="@{/css/common/navbar.css}">
    <link rel="stylesheet" th:href="@{/css/pages/store-crud.css}">
</head>
<body>

<!-- NAVBAR -->
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="crud-page">

    <!-- HEADER -->
    <div class="crud-header">
        <div>
            <h1>Inventory Management</h1>
            <p>Direct Spring MVC CRUD Operations with Backend Pagination & Validation</p>
        </div>
        <div class="header-actions">
            <a th:href="@{/inventory-module/dashboard}" class="btn-secondary">
                ← Dashboard
            </a>
            <a th:href="@{/inventory-module/inventory/create}" class="btn-primary">
                + Add Stock Allocation
            </a>
        </div>
    </div>

    <!-- NOTIFICATIONS -->
    <div th:if="${successMessage != null}" class="alert alert-success">
        <span>✓</span>
        <span th:text="${successMessage}"></span>
    </div>
    <div th:if="${errorMessage != null}" class="alert alert-error">
        <span>⚠️</span>
        <span th:text="${errorMessage}"></span>
    </div>

    <!-- MAIN CARD -->
    <div class="crud-card">
        <div class="table-responsive">
            <table class="crud-table">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Store</th>
                    <th>Product</th>
                    <th>Stock Quantity</th>
                    <th style="text-align: right;">Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="inv : ${inventoryList}">
                    <td th:text="${inv.inventoryId}" style="font-weight: 700; color: #475569;"></td>
                    <td>
                        <span th:text="${inv.storeName}" style="font-weight: 600;"></span>
                        <span th:text="'(ID: ' + ${inv.storeId} + ')'" style="font-size: 0.85em; color: #64748b;"></span>
                    </td>
                    <td>
                        <span th:text="${inv.productName}" style="font-weight: 600;"></span>
                        <span th:text="'(ID: ' + ${inv.productId} + ')'" style="font-size: 0.85em; color: #64748b;"></span>
                    </td>
                    <td th:text="${inv.productInventory}" style="font-weight: 600; color: #0f172a;"></td>
                    <td style="text-align: right; white-space: nowrap;">
                        <a th:href="@{/inventory-module/inventory/edit/{id}(id=${inv.inventoryId})}" class="action-btn edit">
                            Edit
                        </a>
                        <a th:href="@{/inventory-module/inventory/delete/{id}(id=${inv.inventoryId})}" 
                           class="action-btn delete" 
                           onclick="return confirm('Are you sure you want to delete this inventory record?')">
                            Delete
                        </a>
                    </td>
                </tr>
                <tr th:if="${inventoryList.isEmpty()}">
                    <td colspan="5" style="text-align: center; padding: 40px; color: #64748b; font-style: italic;">
                        No inventory records found in database.
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

        <!-- PAGINATION CONTROLS -->
        <div class="pagination-wrapper" th:if="${totalPages > 1}">
            <div class="pagination-info">
                Showing page <span th:text="${currentPage + 1}" style="font-weight: 700; color: #0f172a;"></span> 
                of <span th:text="${totalPages}" style="font-weight: 700; color: #0f172a;"></span> 
                (Total <span th:text="${totalItems}"></span> inventory records)
            </div>
            
            <div class="pagination-links">
                <!-- First Page -->
                <a th:href="@{/inventory-module/inventory(page=0)}" 
                   th:classappend="${currentPage == 0} ? 'disabled' : ''"
                   title="First Page">«</a>
                
                <!-- Previous Page -->
                <a th:href="@{/inventory-module/inventory(page=${currentPage - 1})}" 
                   th:classappend="${currentPage == 0} ? 'disabled' : ''"
                   title="Previous Page">‹</a>
                
                <!-- First Page always if not in range -->
                <a th:if="${currentPage - 3 > 0}"
                   th:href="@{/inventory-module/inventory(page=0)}"
                   th:text="1"></a>
                
                <!-- Ellipsis before window -->
                <span th:if="${currentPage - 3 > 1}" style="display: inline-flex; align-items: center; justify-content: center; width: 38px; height: 38px; border: 1px solid #e2e8f0; border-radius: 10px; color: #64748b; font-weight: 600;">...</span>

                <!-- Dynamic Page Numbers in sliding window -->
                <a th:each="pageNum : ${#numbers.sequence(0, totalPages - 1)}"
                   th:if="${pageNum >= currentPage - 3 && pageNum <= currentPage + 3}"
                   th:href="@{/inventory-module/inventory(page=${pageNum})}"
                   th:text="${pageNum + 1}"
                   th:classappend="${pageNum == currentPage} ? 'active' : ''"></a>

                <!-- Ellipsis after window -->
                <span th:if="${currentPage + 3 < totalPages - 2}" style="display: inline-flex; align-items: center; justify-content: center; width: 38px; height: 38px; border: 1px solid #e2e8f0; border-radius: 10px; color: #64748b; font-weight: 600;">...</span>

                <!-- Last Page always if not in range -->
                <a th:if="${currentPage + 3 < totalPages - 1}"
                   th:href="@{/inventory-module/inventory(page=${totalPages - 1})}"
                   th:text="${totalPages}"></a>
                
                <!-- Next Page -->
                <a th:href="@{/inventory-module/inventory(page=${currentPage + 1})}" 
                   th:classappend="${currentPage == totalPages - 1} ? 'disabled' : ''"
                   title="Next Page">›</a>
                
                <!-- Last Page -->
                <a th:href="@{/inventory-module/inventory(page=${totalPages - 1})}" 
                   th:classappend="${currentPage == totalPages - 1} ? 'disabled' : ''"
                   title="Last Page">»</a>
            </div>
        </div>

    </div>

</div>

</body>
</html>
