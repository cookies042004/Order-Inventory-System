<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Stock Allocation</title>
    <link rel="stylesheet" th:href="@{/css/common/common.css}">
    <link rel="stylesheet" th:href="@{/css/common/navbar.css}">
    <link rel="stylesheet" th:href="@{/css/pages/store-crud.css}">
</head>
<body>

<!-- NAVBAR -->
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="crud-page">

    <!-- HEADER -->
    <div class="crud-header" style="max-width: 600px; margin: 0 auto 30px;">
        <div>
            <h1>Add Stock Allocation</h1>
            <p>Allocate stock/inventory for a specific product at a specific store.</p>
        </div>
    </div>

    <!-- GENERAL ERROR -->
    <div th:if="${errorMessage != null}" class="alert alert-error" style="max-width: 600px; margin: 0 auto 24px;">
        <span>⚠️</span>
        <span th:text="${errorMessage}"></span>
    </div>

    <!-- FORM CARD -->
    <div class="crud-card form-container">
        <form th:action="@{/inventory-module/inventory/create}" th:object="${inventoryForm}" method="post">
            <div class="form-grid">
                
                <!-- Store Dropdown Selection -->
                <div class="form-group">
                    <label for="storeId">Store *</label>
                    <select id="storeId" 
                            th:field="*{storeId}" 
                            class="form-control" 
                            th:classappend="${#fields.hasErrors('storeId')} ? 'is-invalid' : ''"
                            required>
                        <option value="">-- Select Store --</option>
                        <option th:each="store : ${stores}" 
                                th:value="${store.storeId}" 
                                th:text="${store.storeName} + ' (ID: ' + ${store.storeId} + ')'"></option>
                    </select>
                    <span class="field-error" 
                          th:if="${#fields.hasErrors('storeId')}" 
                          th:errors="*{storeId}"></span>
                </div>

                <!-- Product Dropdown Selection -->
                <div class="form-group">
                    <label for="productId">Product *</label>
                    <select id="productId" 
                            th:field="*{productId}" 
                            class="form-control" 
                            th:classappend="${#fields.hasErrors('productId')} ? 'is-invalid' : ''"
                            required>
                        <option value="">-- Select Product --</option>
                        <option th:each="product : ${products}" 
                                th:value="${product.productId}" 
                                th:text="${product.productName} + ' (ID: ' + ${product.productId} + ')'"></option>
                    </select>
                    <span class="field-error" 
                          th:if="${#fields.hasErrors('productId')}" 
                          th:errors="*{productId}"></span>
                </div>

                <!-- Quantity -->
                <div class="form-group">
                    <label for="productInventory">Stock/Inventory Quantity *</label>
                    <input type="number" 
                           id="productInventory" 
                           th:field="*{productInventory}" 
                           class="form-control" 
                           th:classappend="${#fields.hasErrors('productInventory')} ? 'is-invalid' : ''"
                           placeholder="Enter product quantity" 
                           min="0"
                           required>
                    <span class="field-error" 
                          th:if="${#fields.hasErrors('productInventory')}" 
                          th:errors="*{productInventory}"></span>
                </div>

            </div>

            <!-- FORM ACTIONS -->
            <div class="form-actions">
                <a th:href="@{/inventory-module/inventory}" class="btn-secondary">
                    Cancel
                </a>
                <button type="submit" class="btn-primary">
                    Allocate Stock
                </button>
            </div>
        </form>
    </div>

</div>

</body>
</html>
