<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Login</title>

    <link rel="stylesheet"
          th:href="@{/css/common/login.css}">

</head>

<body>

<div class="login-container">

    <div class="login-card">

        <h1>Order Inventory System</h1>

        <p>
            Sign in to continue
        </p>

        <!-- ERROR MESSAGE -->

        <div th:if="${param.error}"
             class="error-message">

            Invalid username or password

        </div>

        <!-- LOGOUT MESSAGE -->

        <div th:if="${param.logout}"
             class="success-message">

            Logged out successfully

        </div>

        <!-- LOGIN FORM -->

        <form th:action="@{/login}"
              method="post">

            <div class="input-group">

                <label>Username</label>

                <input type="text"
                       name="username"
                       required>

            </div>

            <div class="input-group">

                <label>Password</label>

                <input type="password"
                       name="password"
                       required>

            </div>

            <button type="submit"
                    class="login-btn">

                Login

            </button>

        </form>

    </div>

</div>

</body>

</html>
