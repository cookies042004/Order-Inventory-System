<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Shipment</title>
    <link rel="stylesheet" th:href="@{/css/common/common.css}">
    <link rel="stylesheet" th:href="@{/css/common/navbar.css}">
    <link rel="stylesheet" th:href="@{/css/pages/store-crud.css}">
</head>
<body>

<!-- NAVBAR -->
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="crud-page">

    <!-- HEADER -->
    <div class="crud-header" style="max-width: 600px; margin: 0 auto 30px;">
        <div>
            <h1>Edit Shipment</h1>
            <p>Update shipment and delivery details. Unchanged fields will retain their current values.</p>
        </div>
    </div>

    <!-- GENERAL ERROR -->
    <div th:if="${errorMessage != null}" class="alert alert-error" style="max-width: 600px; margin: 0 auto 24px;">
        <span>⚠️</span>
        <span th:text="${errorMessage}"></span>
    </div>

    <!-- FORM CARD -->
    <div class="crud-card form-container">
        <form th:action="@{/shipment-module/shipments/edit/{id}(id=${shipmentId})}" th:object="${shipmentForm}" method="post">
            <div class="form-grid">
                
                <!-- Store Dropdown Selection -->
                <div class="form-group">
                    <label for="storeId">Origin Store *</label>
                    <select id="storeId" 
                            th:field="*{storeId}" 
                            class="form-control" 
                            th:classappend="${#fields.hasErrors('storeId')} ? 'is-invalid' : ''"
                            required>
                        <option value="">-- Select Store --</option>
                        <option th:each="store : ${stores}" 
                                th:value="${store.storeId}" 
                                th:text="${store.storeName} + ' (ID: ' + ${store.storeId} + ')'"></option>
                    </select>
                    <span class="field-error" 
                           th:if="${#fields.hasErrors('storeId')}" 
                           th:errors="*{storeId}"></span>
                </div>

                <!-- Customer Dropdown Selection -->
                <div class="form-group">
                    <label for="customerId">Destination Customer *</label>
                    <select id="customerId" 
                            th:field="*{customerId}" 
                            class="form-control" 
                            th:classappend="${#fields.hasErrors('customerId')} ? 'is-invalid' : ''"
                            required>
                        <option value="">-- Select Customer --</option>
                        <option th:each="cust : ${customers}" 
                                th:value="${cust.customerId}" 
                                th:text="${cust.fullName} + ' (ID: ' + ${cust.customerId} + ')'"></option>
                    </select>
                    <span class="field-error" 
                           th:if="${#fields.hasErrors('customerId')}" 
                           th:errors="*{customerId}"></span>
                </div>

                <!-- Delivery Address -->
                <div class="form-group" style="grid-column: span 2;">
                    <label for="deliveryAddress">Delivery Address *</label>
                    <input type="text" 
                           id="deliveryAddress" 
                           th:field="*{deliveryAddress}" 
                           class="form-control" 
                           th:classappend="${#fields.hasErrors('deliveryAddress')} ? 'is-invalid' : ''"
                           placeholder="Enter full physical address for delivery" 
                           required>
                    <span class="field-error" 
                           th:if="${#fields.hasErrors('deliveryAddress')}" 
                           th:errors="*{deliveryAddress}"></span>
                </div>

                <!-- Shipment Status Dropdown -->
                <div class="form-group">
                    <label for="shipmentStatus">Shipment Status *</label>
                    <select id="shipmentStatus" 
                            th:field="*{shipmentStatus}" 
                            class="form-control" 
                            th:classappend="${#fields.hasErrors('shipmentStatus')} ? 'is-invalid' : ''"
                            required>
                        <option value="">-- Select Status --</option>
                        <option th:each="status : ${statuses}" 
                                th:value="${status}" 
                                th:text="${status.value}"></option>
                    </select>
                    <span class="field-error" 
                           th:if="${#fields.hasErrors('shipmentStatus')}" 
                           th:errors="*{shipmentStatus}"></span>
                </div>

            </div>

            <!-- FORM ACTIONS -->
            <div class="form-actions">
                <a th:href="@{/shipment-module/shipments}" class="btn-secondary">
                    Cancel
                </a>
                <button type="submit" class="btn-primary">
                    Update Shipment
                </button>
            </div>
        </form>
    </div>

</div>

</body>
</html>
